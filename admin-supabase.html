<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - SolarDry Solutions</title>
    
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="style.css">
    
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --admin-bg: #f5f7fa; }
        body { background: var(--admin-bg); min-height: 100vh; font-family: 'Outfit', sans-serif; }
        
        /* Login Form Styles */
        .login-container { display: flex; align-items: center; justify-content: center; min-height: 80vh; padding: 20px; }
        .login-card { background: white; padding: 2.5rem; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; border-top: 5px solid var(--primary-color); }
        .login-card h2 { margin-bottom: 0.5rem; color: var(--dark-color); }
        .login-card p { color: #666; margin-bottom: 2rem; font-size: 0.9rem; }
        .form-group { margin-bottom: 1.25rem; text-align: left; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 0.75rem 1rem; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; transition: border-color 0.3s; }
        .form-group input:focus { outline: none; border-color: var(--primary-color); }
        .btn-login { width: 100%; padding: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-top: 1rem; }
        
        /* Dashboard Layout */
        #admin-content { display: none; padding: 3rem 0; }
        .dashboard-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 2.5rem; border-bottom: 1px solid #ddd; padding-bottom: 1.5rem; }
        .dashboard-header h1 { margin: 0; font-size: 2.2rem; }
        
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: none; font-weight: 600; margin-right: 1.5rem; color: #888; border-bottom: 3px solid transparent; transition: all 0.3s; }
        .tab-btn.active { color: var(--primary-color); border-bottom-color: var(--primary-color); }
        
        .card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); margin-bottom: 2rem; border-left: 4px solid var(--primary-color); }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 1rem; background: #fff; overflow: hidden; border-radius: 8px; }
        .data-table th, .data-table td { padding: 1.25rem; text-align: left; border-bottom: 1px solid #f0f0f0; }
        .data-table th { background: #fdfdfd; font-weight: 600; color: #444; }
        .status-badge { padding: 5px 12px; border-radius: 30px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .status-unread { background: #fee2e2; color: #dc2626; }
        .status-read { background: #dcfce7; color: #166534; }
        
        .btn-small { padding: 6px 14px; font-size: 0.85rem; border-radius: 6px; }
        .btn-delete { background: #ef4444; color: white; border: none; cursor: pointer; }
        .btn-delete:hover { background: #b91c1c; }

        /* Modal Overlay */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; width: 90%; max-width: 550px; padding: 2rem; border-radius: 16px; position: relative; }
        .close-modal { position: absolute; top: 1rem; right: 1rem; cursor: pointer; font-size: 1.5rem; color: #888; }
        
        /* Mobile adjustment */
        @media (max-width: 768px) {
            .dashboard-header { flex-direction: column; align-items: flex-start; gap: 1rem; }
            .data-table th:nth-child(2), .data-table td:nth-child(2) { display: none; }
        }
    </style>
</head>
<body>

    <!-- Unified Navbar -->
    <header class="navbar">
        <div class="container">
            <div class="nav-left">
                <img src="image.png" alt="Logo" class="header-logo left-logo">
                <a href="index.html" class="logo">SolarDry Admin</a>
            </div>
            
            <div class="menu-toggle" id="mobile-menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </div>

            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Main Website</a></li>
                    <li><a href="#" id="auth-link-status">Checking Auth...</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- 1. LOGIN SCREEN -->
    <div id="login-section" class="login-container">
        <div class="login-card">
            <h2>Admin Login</h2>
            <p>Enter your cloud credentials.</p>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" placeholder="admin@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-login" id="loginBtn">Sign Into Dashboard</button>
            </form>
            <p id="login-error" style="color: red; margin-top: 1rem; display: none;"></p>
        </div>
    </div>

    <!-- 2. DASHBOARD CONTENT -->
    <div id="admin-content" class="container">
        <div class="dashboard-header">
            <div>
                <h1>Project Portal</h1>
                <p>Welcome back, <span id="user-email-display" style="font-weight: 600;">Admin</span></p>
            </div>
            <div class="nav-tabs">
                <button class="tab-btn active" onclick="switchTab('products')">Inventory</button>
                <button class="tab-btn" onclick="switchTab('messages')">Messages</button>
                <button class="btn btn-small" id="btnLogout" style="background: #264653;">Logout</button>
            </div>
        </div>

        <!-- Products Management -->
        <section id="products-tab" class="dashboard-tab">
            <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem; align-items: center;">
                <h2>Solar Dryers</h2>
                <button class="btn" onclick="openModal()">+ Add New Unit</button>
            </div>
            <div class="card">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Product Name</th>
                            <th>Model ID</th>
                            <th>Price</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="productTableBody">
                        <tr><td colspan="5">Loading data...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Messages Section -->
        <section id="messages-tab" class="dashboard-tab" style="display:none;">
            <h2>Customer Inquiries</h2>
            <div class="card">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Name</th>
                            <th>Subject</th>
                            <th>Message</th>
                        </tr>
                    </thead>
                    <tbody id="messageTableBody">
                        <tr><td colspan="4">Loading inquiries...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <!-- Modal for Adding Product -->
    <div id="productModal" class="modal">
        <div class="modal-content card">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle">Create New Dryer</h2>
            <form id="productForm">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="pName" placeholder="e.g. Small Farm Unit S-100" required>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label>Model ID</label>
                        <input type="text" id="pModel" placeholder="S-100" required>
                    </div>
                    <div class="form-group">
                        <label>Retail Price (₹)</label>
                        <input type="number" id="pPrice" placeholder="25000" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Description (Optional)</label>
                    <input type="text" id="pDesc" placeholder="Brief description of efficiency...">
                </div>
                <div class="form-actions" style="margin-top: 1.5rem; display: flex; gap: 1rem;">
                    <button type="submit" class="btn">Register Product</button>
                    <button type="button" class="btn" style="background: #aaa;" onclick="closeModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="public/js/api-client.js"></script>
    <script src="mobile-nav.js"></script>
    
    <script>
        const api = new APIClient();
        
        // --- AUTH LOGIC ---
        document.addEventListener('DOMContentLoaded', async () => {
            // Check session
            if (api.supabase) {
                const { data } = await api.supabase.auth.getSession();
                if (data.session) {
                    showDashboard(data.session.user);
                } else {
                    showLogin();
                }
            } else {
                alert("Supabase API key not found in config.js");
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('login-error');
            
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.innerText = "Signing in...";
            loginBtn.disabled = true;

            const { data, error } = await api.supabase.auth.signInWithPassword({ email, password });

            if (error) {
                errorEl.innerText = error.message;
                errorEl.style.display = 'block';
                loginBtn.innerText = "Sign Into Dashboard";
                loginBtn.disabled = false;
            } else {
                showDashboard(data.user);
            }
        });

        document.getElementById('btnLogout').addEventListener('click', async () => {
            await api.supabase.auth.signOut();
            location.reload();
        });

        function showDashboard(user) {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('admin-content').style.display = 'block';
            document.getElementById('user-email-display').innerText = user.email;
            document.getElementById('auth-link-status').innerText = 'Dashboard (Online)';
            loadAllData();
        }

        function showLogin() {
            document.getElementById('login-section').style.display = 'flex';
            document.getElementById('admin-content').style.display = 'none';
            document.getElementById('auth-link-status').innerText = 'Admin Login';
        }

        // --- DATA LOGIC ---
        async function loadAllData() {
            await Promise.all([loadProducts(), loadMessages()]);
        }

        async function loadProducts() {
            const table = document.getElementById('productTableBody');
            const result = await api.getProducts();
            
            if (result.success && result.data.length > 0) {
                table.innerHTML = result.data.map(p => `
                    <tr>
                        <td><strong>${p.name}</strong></td>
                        <td><code style="background: #eee; padding: 2px 5px; border-radius: 4px;">${p.model_id || p.modelId}</code></td>
                        <td>₹${parseFloat(p.price).toLocaleString()}</td>
                        <td><span class="status-badge status-read">${p.status || 'Active'}</span></td>
                        <td>
                            <button class="btn-delete btn-small" onclick="deleteProduct('${p.id}')">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } else {
                table.innerHTML = '<tr><td colspan="5">No products found in database.</td></tr>';
            }
        }

        async function loadMessages() {
            if (!api.supabase) return;
            const table = document.getElementById('messageTableBody');
            
            const { data, error } = await api.supabase
                .from('messages')
                .select('*')
                .order('created_at', { ascending: false });

            if (!error && data && data.length > 0) {
                table.innerHTML = data.map(m => `
                    <tr>
                        <td><small>${new Date(m.created_at).toLocaleDateString()}</small></td>
                        <td><strong>${m.name}</strong><br><small>${m.email}</small></td>
                        <td>${m.subject}</td>
                        <td style="max-width: 300px; font-size: 0.9rem;">${m.message}</td>
                    </tr>
                `).join('');
            } else {
                table.innerHTML = '<tr><td colspan="4">No messages received yet.</td></tr>';
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.dashboard-tab').forEach(t => t.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tab + '-tab').style.display = 'block';
            event.target.classList.add('active');
        }

        // --- CRUD MODAL LOGIC ---
        function openModal() { document.getElementById('productModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('productModal').style.display = 'none'; }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const product = {
                name: document.getElementById('pName').value,
                model_id: document.getElementById('pModel').value,
                price: parseFloat(document.getElementById('pPrice').value),
                description: document.getElementById('pDesc').value,
                status: 'active'
            };

            const { error } = await api.supabase.from('products').insert([product]);
            if (error) {
                alert('Save Failed: ' + error.message);
            } else {
                closeModal();
                loadProducts();
                document.getElementById('productForm').reset();
            }
        });

        async function deleteProduct(id) {
            if (!confirm('Are you absolutely sure? This will remove the dryer from the public catalog.')) return;
            const { error } = await api.supabase.from('products').delete().match({ id: id });
            if (error) alert(error.message);
            else loadProducts();
        }
        
        // Simple click outside to close modal
        window.onclick = function(event) {
            const modal = document.getElementById('productModal');
            if (event.target == modal) closeModal();
        }
    </script>
</body>
</html>
